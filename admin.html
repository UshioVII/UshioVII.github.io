<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — DRM Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808; --bg2: #0d0d0d; --bg3: #111;
      --green: #00ff41; --cyan: #00d4ff; --orange: #ff6b35; --red: #ff4444;
      --text: #b8b8b8; --dim: #454545; --border: #1c1c1c;
      --font: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: var(--bg2);
      border: 1px solid rgba(0,255,65,0.15);
      padding: 2.5rem;
    }
    .login-tag { font-size: 0.65rem; color: var(--green); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .login-title { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 0.3rem; }
    .login-sub { font-size: 0.72rem; color: var(--dim); margin-bottom: 2rem; }
    .login-box label { display: block; font-size: 0.65rem; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.4rem; }
    .login-box input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font); font-size: 1rem;
      padding: 10px 14px; outline: none; letter-spacing: 0.3em;
      transition: border-color 0.2s; margin-bottom: 1.2rem;
    }
    .login-box input:focus { border-color: var(--green); }
    .btn-login {
      width: 100%; padding: 11px; background: var(--green); color: #000;
      font-family: var(--font); font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.12em; border: none; cursor: pointer; transition: all 0.2s;
    }
    .btn-login:hover { background: transparent; color: var(--green); outline: 1px solid var(--green); }
    .login-error { color: var(--red); font-size: 0.72rem; margin-top: 0.8rem; display: none; }
    .login-hint { font-size: 0.62rem; color: var(--dim); margin-top: 1rem; text-align: center; }

    /* ADMIN PANEL */
    #admin-panel { display: none; }
    header {
      background: rgba(8,8,8,0.95);
      border-bottom: 1px solid rgba(0,255,65,0.12);
      padding: 0 2rem;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo { color: var(--green); font-size: 0.88rem; font-weight: 800; }
    .header-logo span { color: var(--dim); font-weight: 400; }
    .header-actions { display: flex; gap: 0.8rem; align-items: center; }
    .btn-sm {
      padding: 6px 14px; font-family: var(--font); font-size: 0.7rem;
      letter-spacing: 0.1em; border: 1px solid var(--border);
      background: transparent; color: var(--dim); cursor: pointer; transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--green); color: var(--green); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
    .btn-sm.accent { border-color: var(--orange); color: var(--orange); }
    .btn-sm.accent:hover { background: var(--orange); color: #000; }

    main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }
    .admin-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    /* FORM */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 1.8rem;
    }
    .panel-title {
      font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--green); margin-bottom: 1.5rem; padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.62rem; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.35rem; }
    .field input, .field textarea, .field select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font); font-size: 0.78rem;
      padding: 8px 12px; outline: none; transition: border-color 0.2s; resize: none;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--green); }
    .field textarea { height: 90px; }
    .field select option { background: var(--bg2); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .form-actions { display: flex; gap: 0.7rem; margin-top: 1.4rem; }
    .btn-add {
      flex: 1; padding: 10px; background: var(--green); color: #000;
      font-family: var(--font); font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.1em; border: none; cursor: pointer; transition: all 0.2s;
    }
    .btn-add:hover { background: transparent; color: var(--green); outline: 1px solid var(--green); }
    .btn-clear {
      padding: 10px 16px; background: transparent; border: 1px solid var(--border);
      color: var(--dim); font-family: var(--font); font-size: 0.78rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-clear:hover { border-color: var(--dim); color: var(--text); }

    /* PROJECT LIST */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .list-count { font-size: 0.65rem; color: var(--dim); }
    .project-list { display: flex; flex-direction: column; gap: 0.7rem; }
    .project-item {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 1rem 1.2rem; display: flex;
      align-items: flex-start; gap: 1rem;
      transition: border-color 0.2s;
    }
    .project-item:hover { border-color: rgba(0,255,65,0.15); }
    .project-item.editing { border-color: var(--cyan); }
    .pi-info { flex: 1; min-width: 0; }
    .pi-title { font-size: 0.88rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pi-meta { font-size: 0.65rem; color: var(--dim); }
    .pi-meta span { color: var(--cyan); }
    .pi-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .pi-btn {
      padding: 4px 10px; font-family: var(--font); font-size: 0.62rem;
      letter-spacing: 0.08em; border: 1px solid var(--border);
      background: transparent; color: var(--dim); cursor: pointer; transition: all 0.2s;
    }
    .pi-btn:hover { color: var(--green); border-color: var(--green); }
    .pi-btn.del:hover { color: var(--red); border-color: var(--red); }
    .pi-placeholder { font-size: 0.6rem; color: var(--orange); opacity: 0.6; }

    .empty-state {
      text-align: center; padding: 3rem;
      color: var(--dim); font-size: 0.75rem; letter-spacing: 0.1em;
    }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--bg3); border: 1px solid var(--green);
      color: var(--green); padding: 12px 20px;
      font-size: 0.75rem; letter-spacing: 0.1em;
      opacity: 0; transform: translateY(10px);
      transition: all 0.3s; z-index: 9999; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: var(--red); color: var(--red); }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--dim); text-decoration: none; font-size: 0.7rem;
      letter-spacing: 0.1em; transition: color 0.2s;
    }
    .back-link:hover { color: var(--green); }

    @media (max-width: 800px) {
      .admin-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <p class="login-tag">// admin.access</p>
    <h1 class="login-title">Panel Admin</h1>
    <p class="login-sub">Acceso restringido — DRM Portfolio</p>
    <label for="pin-input">PIN de acceso</label>
    <input type="password" id="pin-input" placeholder="••••" maxlength="10" autofocus>
    <button class="btn-login" onclick="checkPin()">Ingresar &rarr;</button>
    <p class="login-error" id="login-error">PIN incorrecto. Intentá de nuevo.</p>
    <p class="login-hint">PIN por defecto: <strong style="color:var(--green)">1234</strong></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <header>
    <div class="header-logo">DRM<span>_admin</span></div>
    <div class="header-actions">
      <a href="index.html" class="back-link">← Ver portfolio</a>
      <button class="btn-sm accent" onclick="exportJSON()">↓ Exportar JSON</button>
      <button class="btn-sm danger" onclick="resetToDefault()">⚠ Reset defaults</button>
      <button class="btn-sm" onclick="changePin()">Cambiar PIN</button>
      <button class="btn-sm" onclick="logout()">Salir</button>
    </div>
  </header>

  <main>
    <div class="admin-grid">

      <!-- FORM -->
      <div>
        <div class="panel">
          <p class="panel-title" id="form-title">// agregar proyecto</p>

          <div class="field">
            <label>Título del proyecto *</label>
            <input type="text" id="f-title" placeholder="Mi Proyecto">
          </div>

          <div class="field">
            <label>Descripción *</label>
            <textarea id="f-desc" placeholder="Descripción breve del proyecto..."></textarea>
          </div>

          <div class="field-row">
            <div class="field">
              <label>Categoría</label>
              <select id="f-cat">
                <option value="web">Web App</option>
                <option value="cliente">Cliente</option>
                <option value="ia">AI / ML</option>
              </select>
            </div>
            <div class="field">
              <label>Badge</label>
              <select id="f-badge">
                <option value="featured">★ Destacado</option>
                <option value="client">◆ Cliente</option>
                <option value="ai">◈ AI / ML</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Tecnologías (separadas por coma)</label>
            <input type="text" id="f-tech" placeholder="React, Node.js, MySQL">
          </div>

          <div class="field">
            <label>URL del proyecto (opcional)</label>
            <input type="url" id="f-url" placeholder="https://...">
          </div>

          <div class="field">
            <label>URL de GitHub (opcional)</label>
            <input type="url" id="f-github" placeholder="https://github.com/...">
          </div>

          <input type="hidden" id="f-id">

          <div class="form-actions">
            <button class="btn-add" onclick="saveProject()" id="save-btn">+ Guardar proyecto</button>
            <button class="btn-clear" onclick="clearForm()">Limpiar</button>
          </div>
        </div>
      </div>

      <!-- LIST -->
      <div>
        <div class="list-header">
          <p class="panel-title" style="margin-bottom:0">// proyectos guardados</p>
          <span class="list-count" id="list-count"></span>
        </div>
        <div id="project-list" class="project-list"></div>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  var PIN_KEY = 'drm_pin';
  var PROJECTS_KEY = 'drm_projects';

  var DEFAULT_PROJECTS = [
    { id: 1, title: 'E-commerce Platform', description: 'Plataforma de ventas online con carrito de compras, pasarela de pagos y panel de administración.', tech: ['React','Node.js','MySQL','Stripe'], category: 'web', badge: 'featured', url: '', github: '', placeholder: true },
    { id: 2, title: 'AI Chat Assistant', description: 'Chatbot con OpenAI API para automatizar atención al cliente con respuestas contextuales.', tech: ['Python','OpenAI API','FastAPI','React'], category: 'ia', badge: 'ai', url: '', github: '', placeholder: true },
    { id: 3, title: 'Automatización de Flujos', description: 'Sistema de automatización conectando múltiples APIs, notificaciones y bases de datos.', tech: ['Python','n8n','Webhooks','REST APIs'], category: 'ia', badge: 'ai', url: '', github: '', placeholder: true },
    { id: 4, title: 'Web Cliente — [Negocio]', description: 'Sitio web profesional para cliente local con animaciones de scroll, SEO y formulario de contacto.', tech: ['HTML','CSS','JavaScript','GSAP'], category: 'cliente', badge: 'client', url: '', github: '', placeholder: true },
    { id: 5, title: 'Dashboard Analytics', description: 'Panel de control con visualización de datos en tiempo real y exportación de reportes.', tech: ['React','D3.js','Node.js','MongoDB'], category: 'web', badge: 'featured', url: '', github: '', placeholder: true },
    { id: 6, title: 'Landing Page — [Cliente 2]', description: 'Landing page con integración de WhatsApp, formularios inteligentes y diseño mobile-first.', tech: ['HTML','CSS','JavaScript','PHP'], category: 'cliente', badge: 'client', url: '', github: '', placeholder: true }
  ];

  function getPin() { return localStorage.getItem(PIN_KEY) || '1234'; }
  function getProjects() {
    var s = localStorage.getItem(PROJECTS_KEY);
    if (s) { try { return JSON.parse(s); } catch(e) {} }
    return JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
  }
  function saveProjects(list) { localStorage.setItem(PROJECTS_KEY, JSON.stringify(list)); }

  function checkPin() {
    var val = document.getElementById('pin-input').value;
    if (val === getPin()) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      renderList();
    } else {
      var err = document.getElementById('login-error');
      err.style.display = 'block';
      setTimeout(function() { err.style.display = 'none'; }, 3000);
    }
  }
  document.getElementById('pin-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPin();
  });

  function logout() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pin-input').value = '';
  }

  function changePin() {
    var np = prompt('Ingresá el nuevo PIN (mínimo 4 caracteres):');
    if (np && np.length >= 4) {
      localStorage.setItem(PIN_KEY, np);
      toast('PIN actualizado correctamente');
    } else if (np !== null) {
      toast('El PIN debe tener al menos 4 caracteres', true);
    }
  }

  function clearForm() {
    document.getElementById('f-id').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-tech').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('f-github').value = '';
    document.getElementById('f-cat').value = 'web';
    document.getElementById('f-badge').value = 'featured';
    document.getElementById('form-title').textContent = '// agregar proyecto';
    document.getElementById('save-btn').textContent = '+ Guardar proyecto';
    document.querySelectorAll('.project-item').forEach(function(el) { el.classList.remove('editing'); });
  }

  function saveProject() {
    var title = document.getElementById('f-title').value.trim();
    var desc  = document.getElementById('f-desc').value.trim();
    if (!title || !desc) { toast('Título y descripción son obligatorios', true); return; }

    var techRaw = document.getElementById('f-tech').value.trim();
    var tech = techRaw ? techRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean) : [];
    var projects = getProjects();
    var existingId = document.getElementById('f-id').value;

    if (existingId) {
      // Edit
      var idx = projects.findIndex(function(p) { return String(p.id) === existingId; });
      if (idx > -1) {
        projects[idx].title = title;
        projects[idx].description = desc;
        projects[idx].tech = tech;
        projects[idx].category = document.getElementById('f-cat').value;
        projects[idx].badge = document.getElementById('f-badge').value;
        projects[idx].url = document.getElementById('f-url').value.trim();
        projects[idx].github = document.getElementById('f-github').value.trim();
        projects[idx].placeholder = false;
        toast('Proyecto actualizado');
      }
    } else {
      // Add
      var maxId = projects.reduce(function(m, p) { return Math.max(m, p.id); }, 0);
      projects.push({
        id: maxId + 1,
        title: title,
        description: desc,
        tech: tech,
        category: document.getElementById('f-cat').value,
        badge: document.getElementById('f-badge').value,
        url: document.getElementById('f-url').value.trim(),
        github: document.getElementById('f-github').value.trim(),
        placeholder: false
      });
      toast('Proyecto agregado');
    }

    saveProjects(projects);
    renderList();
    clearForm();
  }

  function editProject(id) {
    var projects = getProjects();
    var p = projects.find(function(x) { return x.id === id; });
    if (!p) return;
    document.getElementById('f-id').value = p.id;
    document.getElementById('f-title').value = p.title;
    document.getElementById('f-desc').value = p.description;
    document.getElementById('f-tech').value = p.tech.join(', ');
    document.getElementById('f-url').value = p.url || '';
    document.getElementById('f-github').value = p.github || '';
    document.getElementById('f-cat').value = p.category;
    document.getElementById('f-badge').value = p.badge;
    document.getElementById('form-title').textContent = '// editando proyecto';
    document.getElementById('save-btn').textContent = '✓ Guardar cambios';
    document.querySelectorAll('.project-item').forEach(function(el) { el.classList.remove('editing'); });
    var item = document.querySelector('[data-id="' + id + '"]');
    if (item) item.classList.add('editing');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteProject(id) {
    if (!confirm('¿Eliminar este proyecto?')) return;
    var projects = getProjects().filter(function(p) { return p.id !== id; });
    saveProjects(projects);
    renderList();
    clearForm();
    toast('Proyecto eliminado');
  }

  function renderList() {
    var projects = getProjects();
    var list = document.getElementById('project-list');
    document.getElementById('list-count').textContent = projects.length + ' proyecto' + (projects.length !== 1 ? 's' : '');

    if (!projects.length) {
      list.innerHTML = '<div class="empty-state">// Sin proyectos todavía<br>Agregá el primero desde el formulario</div>';
      return;
    }

    list.innerHTML = projects.map(function(p) {
      var techStr = p.tech.slice(0, 3).join(', ') + (p.tech.length > 3 ? '...' : '');
      var phNote = p.placeholder ? '<span class="pi-placeholder">// placeholder</span>' : '';
      return '<div class="project-item" data-id="' + p.id + '">' +
        '<div class="pi-info">' +
          '<div class="pi-title">' + p.title + '</div>' +
          '<div class="pi-meta"><span>' + p.category + '</span> · ' + techStr + '</div>' +
          phNote +
        '</div>' +
        '<div class="pi-actions">' +
          '<button class="pi-btn" onclick="editProject(' + p.id + ')">editar</button>' +
          '<button class="pi-btn del" onclick="deleteProject(' + p.id + ')">× eliminar</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function exportJSON() {
    var projects = getProjects();
    var blob = new Blob([JSON.stringify(projects, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'projects.json';
    a.click();
    toast('JSON exportado');
  }

  function resetToDefault() {
    if (!confirm('¿Restaurar los proyectos placeholder por defecto? Esto reemplaza todos los actuales.')) return;
    localStorage.removeItem(PROJECTS_KEY);
    renderList();
    toast('Proyectos restaurados al estado inicial');
  }

  function toast(msg, isError) {
    var el = document.getElementById('toast');
    el.textContent = (isError ? '✗ ' : '✓ ') + msg;
    el.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(function() { el.className = 'toast'; }, 3000);
  }
</script>
</body>
</html>
